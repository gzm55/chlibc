---
name: CI & Release

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  pull_request:
    branches: [main]

env:
  # Format: <conda-arch>:<build-dir>
  ARCH_MAP: "x86_64:build/clang-x86_64 aarch64:build/clang-aarch64 ppc64le:build/gcc-powerpc64le"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.62.0
          cache: true

      - name: Lint
        run: pixi run lint

      - name: Build All Architectures
        run: pixi run build

      - name: Build Conda Packages
        run: pixi run conda-build

      - name: Verify Binaries Checksums
        run: |
          hash_in_pkg() {
            local CONDA_ARCH="$1"
            local CONDA_PKG=$(pixi run "conda-build-$CONDA_ARCH" --render-only 2>/dev/null |
                              jq -r '.[0].build_configuration
                                     | (.directories.build_dir | split("/bld/")[0])
                                       + "/" + .target_platform + "/"
                                       + (.subpackages | to_entries[0].value | .name + "-" + .version + "-" + .build_string)
                                       + ".conda"')

            test -e "$CONDA_PKG" || return 1
            unzip -p "$CONDA_PKG" "pkg-*.tar.zst" | tar --zstd -xOf - bin/chlibc | sha256sum | awk '{print $1}'
          }

          echo "=== SHA256 Checksums Verification ==="
          for cfg in ${{ env.ARCH_MAP }}; do
            ARCH=${cfg%%:*}
            SRC_PATH=${cfg#*:}

            BIN_HASH=$(sha256sum "$SRC_PATH/bin/chlibc" | awk '{print $1}')
            PKG_HASH=$(hash_in_pkg "$ARCH")

            echo "Arch: $ARCH | Bin: $BIN_HASH | Pkg: $PKG_HASH"
            if [ "$BIN_HASH" != "$PKG_HASH" ]; then
              echo "Error: Checksum changed in $ARCH conda packages!" >&2
              exit 1
            else
              echo OK
            fi
          done

      - name: Verify Checksums against Tag Message
        if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_MSG=$(git for-each-ref --format='%(contents)' refs/tags/${{ github.ref_name }})

          for cfg in ${{ env.ARCH_MAP }}; do
            ARCH=${cfg%%:*}
            SRC_PATH=${cfg#*:}

            EXPECTED=$(echo "$TAG_MSG" | grep "chlibc-$ARCH" | awk '{print $1}')
            ACTUAL=$(sha256sum "$SRC_PATH/bin/chlibc" | awk '{print $1}')

            echo "Arch: $ARCH | Expected: ${EXPECTED:-N/A} | Actual: $ACTUAL"
            if [ -z "$EXPECTED" ] || [ "$EXPECTED" != "$ACTUAL" ]; then
              echo "Error: Tag checksum mismatch for $ARCH!" >&2
              exit 1
            else
              echo OK
            fi
          done
          echo "Checksums verified."

      - name: Prepare Release Artifacts
        if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p artifacts

          # Extract binaries and Generate checksums
          for cfg in ${{ env.ARCH_MAP }}; do
            ARCH=${cfg%%:*}
            SRC_PATH=${cfg#*:}
            TARGET="artifacts/chlibc-$ARCH"
            cp "$SRC_PATH/bin/chlibc" "$TARGET"
            sha256sum "$TARGET" | sed 's|artifacts/||' > "$TARGET.sha256"
          done
          cat artifacts/*.sha256 > artifacts/checksums.txt

      - name: Upload Artifacts for Release
        if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/*
          retention-days: 1

  release:
    needs: build
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      # Grant write permission exclusively to the release job
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts

      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
